<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Phoenix · Messages</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    /* ===== المتغيرات الأساسية ===== */
    :root {
      --bg: #f9fafc;
      --surface: #ffffff;
      --text-primary: #1e1e2f;
      --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c;
      --accent-2: #ff6b2b;
      --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --border: #eaeef2;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.05);
      --glow: rgba(255, 110, 64, 0.4);
      --navbar-bg: rgba(255, 255, 255, 0.7);
      --border-glass: rgba(255, 255, 255, 0.35);
      --sent-bg: var(--gradient);
      --received-bg: #ffffff;
    }

    /* Dark Mode Variables */
    body.dark {
      --bg: #12121a;
      --surface: #1e1e2a;
      --text-primary: #f0f0fa;
      --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e;
      --accent-2: #ff7b3f;
      --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --border: #333344;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
      --glow: rgba(255, 140, 80, 0.6);
      --navbar-bg: rgba(30, 30, 42, 0.8);
      --border-glass: rgba(255, 255, 255, 0.15);
      --sent-bg: var(--gradient);
      --received-bg: #2a2a3c;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      transition: background 0.3s, color 0.2s;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== NAVBAR (النموذج الجديد) ===== */
    .nav-mini {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--navbar-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-glass);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-area img {
      height: 52px;
      width: auto;
      border-radius: 12px;
    }

    .logo-text h2 {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .logo-text span {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: block;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.3rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .theme-toggle:hover {
      transform: rotate(15deg);
    }

    /* تحسينات للشاشات الصغيرة */
    @media (max-width: 768px) {
      .nav-mini {
        padding: 0.8rem 1rem;
      }
      .logo-area img {
        height: 44px;
      }
      .logo-text h2 {
        font-size: 1.3rem;
      }
      .logo-text span {
        display: none;
      }
    }

    /* ===== CHAT LAYOUT ===== */
    .chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar */
    .chat-sidebar {
      width: 350px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      z-index: 10;
    }

    .sidebar-header {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h3 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .search-box {
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent-1);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .conversation-item:hover {
      background: rgba(255, 138, 76, 0.05);
    }

    .conversation-item.active {
      background: rgba(255, 138, 76, 0.1);
      border-left: 4px solid var(--accent-1);
    }

    .conv-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-1);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .conv-info {
      flex: 1;
      min-width: 0;
    }

    .conv-name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.2rem;
    }

    .conv-name {
      font-weight: 600;
    }

    .conv-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .conv-lastmsg {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: var(--accent-1);
      color: white;
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 0.5rem;
      padding: 0 4px;
    }

    /* Main Chat Window */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    .chat-header {
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-1);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.2rem;
    }

    .chat-header-info h3 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .chat-header-info p {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .chat-messages {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message-bubble {
      max-width: 70%;
      padding: 0.8rem 1.2rem;
      border-radius: 20px;
      position: relative;
      word-wrap: break-word;
      box-shadow: var(--shadow);
      line-height: 1.4;
    }

    .message-bubble.sent {
      background: var(--sent-bg);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .message-bubble.received {
      background: var(--received-bg);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .message-time {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 0.3rem;
      text-align: right;
    }

    .typing-indicator {
      align-self: flex-start;
      background: var(--received-bg);
      border: 1px solid var(--border);
      padding: 0.8rem 1.2rem;
      border-radius: 20px;
      border-bottom-left-radius: 5px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    .typing-indicator i {
      font-size: 0.7rem;
      animation: blink 1.4s infinite;
    }

    .typing-indicator i:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator i:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    .chat-input-area {
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-input-area input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
    }

    .chat-input-area button {
      background: var(--gradient);
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px var(--glow);
      transition: transform 0.2s;
    }

    .chat-input-area button:hover {
      transform: scale(1.05);
    }

    .attach-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-align: center;
      padding: 2rem;
    }

    .empty-state i {
      font-size: 4rem;
      color: var(--accent-1);
      opacity: 0.5;
      margin-bottom: 1rem;
    }

    /* Mobile Toggle */
    .mobile-back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--accent-1);
      font-size: 1.5rem;
      cursor: pointer;
      margin-right: 1rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .chat-sidebar {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        transform: translateX(-100%);
        z-index: 20;
      }

      .chat-sidebar.mobile-visible {
        transform: translateX(0);
      }

      .mobile-back-btn {
        display: block;
      }

      .chat-header {
        padding: 0.8rem 1rem;
      }

      .message-bubble {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>

<!-- ========== NAVBAR (النموذج الجديد) ========== -->
<div class="nav-mini">
  <div class="logo-area">
    <img src="photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
    <div class="logo-text">
      <h2>Phoenix</h2>
      <span>donate & trade</span>
    </div>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle">
      <i class="fas fa-moon"></i>
    </button>
  </div>
</div>

<!-- ========== CHAT LAYOUT ========== -->
<div class="chat-layout">
  <!-- Sidebar -->
  <div class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-header">
      <h3>Messages</h3>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search conversations...">
      </div>
    </div>
    <div class="conversation-list" id="conversationList">
      <!-- تملأ عبر JavaScript -->
    </div>
  </div>

  <!-- Main Chat Window -->
  <div class="chat-main" id="chatMain">
    <!-- Empty state افتراضي -->
    <div class="empty-state" id="emptyState">
      <i class="far fa-comments"></i>
      <h3>Select a conversation</h3>
      <p>Choose a contact to start messaging</p>
    </div>

    <!-- Chat content (سيظهر عند اختيار محادثة) -->
    <div id="chatContent" style="display: none; flex-direction: column; height: 100%;">
      <div class="chat-header">
        <button class="mobile-back-btn" id="mobileBackBtn"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-avatar" id="activeAvatar">?</div>
        <div class="chat-header-info">
          <h3 id="activeName">Select contact</h3>
          <p id="activeProduct"> </p>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <!-- الرسائل تظهر هنا -->
      </div>
      <div class="chat-input-area">
        <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="messageInput" placeholder="Type a message..." disabled>
        <button id="sendMessageBtn" disabled><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script src="main.js"></script>
<script>
  (function() {
    'use strict';

    // ========== MOCK DATA ==========
    const conversations = [
      {
        id: 1,
        name: 'Ahmed Hassan',
        avatar: 'A',
        product: 'MacBook Pro 16"',
        lastMessage: 'Is the MacBook still available?',
        time: '2m ago',
        unread: 2,
        messages: [
          { sender: 'them', text: 'Hi! Is the MacBook still available?', time: '10:30 AM' },
          { sender: 'me', text: 'Yes, it is! Are you interested?', time: '10:32 AM' },
          { sender: 'them', text: 'Great! Can we meet tomorrow?', time: '10:35 AM' }
        ]
      },
      {
        id: 2,
        name: 'Laila M.',
        avatar: 'L',
        product: 'Winter Coat',
        lastMessage: 'Thanks for the coat!',
        time: '1h ago',
        unread: 0,
        messages: [
          { sender: 'them', text: 'I received the coat. It\'s perfect, thank you!', time: '09:15 AM' },
          { sender: 'me', text: 'You\'re welcome! Stay warm.', time: '09:20 AM' }
        ]
      },
      {
        id: 3,
        name: 'Omar S.',
        avatar: 'O',
        product: 'Kids Bicycle',
        lastMessage: 'When can I pick it up?',
        time: '3h ago',
        unread: 1,
        messages: [
          { sender: 'them', text: 'Hello, I\'m interested in the bicycle.', time: 'Yesterday' },
          { sender: 'me', text: 'Sure, it\'s still available. When would you like to come?', time: 'Yesterday' },
          { sender: 'them', text: 'Tomorrow afternoon?', time: 'Yesterday' }
        ]
      },
      {
        id: 4,
        name: 'Support Team',
        avatar: 'P',
        product: 'Phoenix Help',
        lastMessage: 'Welcome to Phoenix!',
        time: '1d ago',
        unread: 0,
        messages: [
          { sender: 'them', text: '👋 Welcome to Phoenix! Let us know if you need help.', time: 'Monday' }
        ]
      }
    ];

    // ========== DOM Elements ==========
    const sidebar = document.getElementById('chatSidebar');
    const convList = document.getElementById('conversationList');
    const emptyState = document.getElementById('emptyState');
    const chatContent = document.getElementById('chatContent');
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendMessageBtn');
    const activeName = document.getElementById('activeName');
    const activeAvatar = document.getElementById('activeAvatar');
    const activeProduct = document.getElementById('activeProduct');
    const searchInput = document.getElementById('searchInput');
    const mobileBackBtn = document.getElementById('mobileBackBtn');
    const attachBtn = document.getElementById('attachBtn');

    let activeConversationId = null;
    let typingTimeout = null;

    // ========== Dark Mode (حقيقي مع localStorage) ==========
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    
    // تحميل الحالة المحفوظة
    const savedTheme = localStorage.getItem('phoenix-theme');
    if (savedTheme === 'dark') {
      body.classList.add('dark');
      themeToggle.querySelector('i').className = 'fas fa-sun';
    }

    function toggleDarkMode() {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      const icon = themeToggle.querySelector('i');
      icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('phoenix-theme', isDark ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', toggleDarkMode);

    // ========== عرض قائمة المحادثات ==========
    function renderConversationList(filterText = '') {
      const filtered = conversations.filter(c => 
        c.name.toLowerCase().includes(filterText.toLowerCase()) ||
        c.product.toLowerCase().includes(filterText.toLowerCase())
      );

      convList.innerHTML = filtered.map(conv => `
        <div class="conversation-item ${activeConversationId === conv.id ? 'active' : ''}" data-id="${conv.id}">
          <div class="conv-avatar">${conv.avatar}</div>
          <div class="conv-info">
            <div class="conv-name-row">
              <span class="conv-name">${conv.name}</span>
              <span class="conv-time">${conv.time}</span>
            </div>
            <div class="conv-lastmsg">
              ${conv.lastMessage}
              ${conv.unread > 0 ? `<span class="unread-badge">${conv.unread}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');

      // ربط الأحداث
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = parseInt(item.dataset.id);
          openConversation(id);
          if (window.innerWidth <= 768) {
            sidebar.classList.remove('mobile-visible');
          }
        });
      });
    }

    // ========== فتح محادثة ==========
    function openConversation(id) {
      const conv = conversations.find(c => c.id === id);
      if (!conv) return;

      activeConversationId = id;
      
      // تحديث الـ header
      activeName.textContent = conv.name;
      activeAvatar.textContent = conv.avatar;
      activeProduct.innerHTML = `<i class="fas fa-tag"></i> ${conv.product}`;

      // عرض المحتوى وإخفاء empty state
      emptyState.style.display = 'none';
      chatContent.style.display = 'flex';

      // تمكين الإدخال
      messageInput.disabled = false;
      sendBtn.disabled = false;

      // تعليم الرسائل كمقروءة
      conv.unread = 0;

      // عرض الرسائل
      renderMessages(conv.messages);

      // تحديث القائمة لتظهر active
      renderConversationList(searchInput.value);

      // Auto-scroll
      setTimeout(() => {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 50);
    }

    // ========== عرض الرسائل ==========
    function renderMessages(messages) {
      chatMessages.innerHTML = messages.map(msg => `
        <div class="message-bubble ${msg.sender === 'me' ? 'sent' : 'received'}">
          ${msg.text}
          <div class="message-time">${msg.time}</div>
        </div>
      `).join('');
    }

    // ========== إضافة رسالة ==========
    function addMessage(text, sender = 'me') {
      if (!activeConversationId) return;
      const conv = conversations.find(c => c.id === activeConversationId);
      if (!conv) return;

      const newMsg = {
        sender,
        text,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      };
      conv.messages.push(newMsg);
      conv.lastMessage = text;
      
      renderMessages(conv.messages);
      renderConversationList(searchInput.value);
      
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // ========== محاكاة رد الطرف الآخر ==========
    function simulateReply() {
      if (!activeConversationId) return;
      const conv = conversations.find(c => c.id === activeConversationId);
      if (!conv) return;

      // إظهار typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `${conv.name} is typing <i class="fas fa-circle"></i><i class="fas fa-circle"></i><i class="fas fa-circle"></i>`;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // بعد 2-3 ثواني، إزالة المؤشر وإضافة رد
      typingTimeout = setTimeout(() => {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
        
        const replies = [
          "Sure, let me check.",
          "That sounds good!",
          "I'll get back to you soon.",
          "Thanks for the message.",
          "Can we discuss details?"
        ];
        const randomReply = replies[Math.floor(Math.random() * replies.length)];
        addMessage(randomReply, 'them');
      }, 2500);
    }

    // ========== إرسال رسالة ==========
    function handleSendMessage() {
      const text = messageInput.value.trim();
      if (!text || !activeConversationId) return;
      
      addMessage(text, 'me');
      messageInput.value = '';
      
      // إلغاء typing سابق إن وجد
      if (typingTimeout) clearTimeout(typingTimeout);
      
      // محاكاة رد بعد ثانية
      setTimeout(() => simulateReply(), 1000);
    }

    // ========== قراءة معامل user/seller من URL ==========
    function handleUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const targetUser = params.get('user') || params.get('seller');
      const targetProduct = params.get('product');

      if (targetUser) {
        // البحث عن محادثة تطابق الاسم
        let targetConv = conversations.find(c => 
          c.name.toLowerCase().includes(targetUser.toLowerCase())
        );
        
        // إذا لم توجد، أنشئ محادثة جديدة
        if (!targetConv) {
          const newConv = {
            id: Date.now(),
            name: targetUser,
            avatar: targetUser.charAt(0).toUpperCase(),
            product: targetProduct || 'New conversation',
            lastMessage: 'Start messaging...',
            time: 'Now',
            unread: 0,
            messages: []
          };
          conversations.push(newConv);
          targetConv = newConv;
        }
        
        // فتح المحادثة
        openConversation(targetConv.id);
        if (targetProduct) {
          activeProduct.innerHTML = `<i class="fas fa-tag"></i> ${targetProduct}`;
        }
        
        renderConversationList();
      }
    }

    // ========== Mobile Back ==========
    mobileBackBtn.addEventListener('click', () => {
      sidebar.classList.add('mobile-visible');
    });

    // ========== Search ==========
    searchInput.addEventListener('input', (e) => {
      renderConversationList(e.target.value);
    });

    // ========== Attach (محاكاة) ==========
    attachBtn.addEventListener('click', () => {
      alert('File attachment coming soon!');
    });

    // ========== Event Listeners ==========
    sendBtn.addEventListener('click', handleSendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handleSendMessage();
      }
    });

    // ========== بدء التشغيل ==========
    function init() {
      renderConversationList();
      handleUrlParams();
      
      // إذا لم يتم فتح أي محادثة، نظل على empty state
      if (!activeConversationId) {
        emptyState.style.display = 'flex';
        chatContent.style.display = 'none';
      }
    }

    init();

    // ========== زر فتح القائمة في الموبايل (يُضاف ديناميكياً) ==========
    const openSidebarBtn = document.createElement('button');
    openSidebarBtn.className = 'mobile-back-btn';
    openSidebarBtn.style.marginRight = '0';
    openSidebarBtn.innerHTML = '<i class="fas fa-bars"></i>';
    openSidebarBtn.addEventListener('click', () => {
      sidebar.classList.add('mobile-visible');
    });
    document.querySelector('.chat-header .chat-header-info')?.before(openSidebarBtn);

    // تعديل بسيط: زر القائمة يظهر فقط في الموبايل (نضعه في الهيدر)
    const headerDiv = document.querySelector('.chat-header');
    if (headerDiv && !headerDiv.contains(openSidebarBtn)) {
      headerDiv.insertBefore(openSidebarBtn, headerDiv.firstChild);
    }

  })();
</script>
</body>
</html>
